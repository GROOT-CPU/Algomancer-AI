<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Algomancer</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f1e36,#1e3a5f);
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:30px;
font-size:32px;
}

.container{
width:85%;
max-width:950px;
margin:40px auto;
background:#142746;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

textarea{
width:100%;
height:220px;
border-radius:10px;
padding:15px;
font-size:14px;
margin-top:20px;
border:none;
background:#f5f7fa;
color:#111;
outline:none;
}

select{
padding:10px 14px;
margin:12px;
border-radius:8px;
border:none;
font-weight:600;
}

button{
background:linear-gradient(135deg,#22c55e,#16a34a);
border:none;
padding:13px 28px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.output{
background:#1e2d48;
margin-top:40px;
padding:20px;
border-radius:10px;
text-align:left;
position:relative;
}

.copyBtn{
position:absolute;
top:20px;
right:20px;
background:#3b82f6;
padding:8px 14px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

pre{
background:#0b162b;
padding:18px;
border-radius:8px;
overflow:auto;
border-left:4px solid #22c55e;
margin-top:15px;
}

</style>
</head>

<body>

<h1>⚡ Algomancer</h1>

<div class="container">

<textarea id="codeInput" placeholder="Paste your code here..."></textarea>

<br>

<label>Input Language</label>

<select id="inputLanguage">
<option value="python">Python</option>
<option value="java">Java</option>
<option value="javascript">JavaScript</option>
<option value="c">C</option>
<option value="cpp">C++</option>
</select>

<label>Convert To</label>

<select id="outputLanguage">
<option value="python">Python</option>
<option value="java">Java</option>
<option value="javascript">JavaScript</option>
<option value="c">C</option>
<option value="cpp">C++</option>
</select>

<br>

<button onclick="optimizeCode()">Optimize / Convert Code</button>

<div class="output">
<h3>Optimized / Converted Code</h3>
<button class="copyBtn" onclick="copyCode()">Copy</button>
<pre id="outputCode">Result will appear here...</pre>
</div>

</div>

<script>

/* AUTO SWITCH LOCAL / DEPLOYED BACKEND */

const API_URL =
window.location.hostname === "localhost"
? "http://127.0.0.1:8000"
: "https://algomancer.onrender.com";

async function optimizeCode(){

const code=document.getElementById("codeInput").value;
const inputLanguage=document.getElementById("inputLanguage").value;
const outputLanguage=document.getElementById("outputLanguage").value;

if(code.trim()===""){
alert("Please enter code");
return;
}

document.getElementById("outputCode").innerText=
"⚡ Algomancer is processing your code...";

try{

const response=await fetch(`${API_URL}/optimize`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
code:code,
input_language:inputLanguage,
output_language:outputLanguage
})
});

if(!response.ok){
throw new Error("Backend error");
}

const data=await response.json();

document.getElementById("outputCode").innerText=
data.optimized_code || "No response received.";

}catch(error){

console.error(error);

document.getElementById("outputCode").innerText=
"❌ Error connecting to backend";

}

}

function copyCode(){

const code=document.getElementById("outputCode").innerText;

navigator.clipboard.writeText(code);

alert("Code copied!");

}

</script>

</body>
</html>
