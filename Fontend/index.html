<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Algomancer</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f1e36,#1e3a5f);
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:30px;
font-size:32px;
letter-spacing:1px;
}

.container{
width:85%;
max-width:950px;
margin:40px auto;
background:#142746;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

textarea{
width:100%;
height:220px;
border-radius:10px;
padding:15px;
font-size:14px;
margin-top:20px;
border:none;
background:#f5f7fa;
color:#111;
outline:none;
transition:all 0.25s ease;
}

textarea:focus{
transform:scale(1.01);
box-shadow:0 0 8px #60a5fa;
}

label{
font-weight:bold;
margin-right:10px;
}

select{
padding:10px 14px;
margin:12px;
border-radius:8px;
border:none;
background:#ffffff;
color:#111;
font-weight:600;
cursor:pointer;
transition:all 0.25s ease;
box-shadow:0 3px 6px rgba(0,0,0,0.2);
}

select:hover{
transform:translateY(-2px);
box-shadow:0 6px 12px rgba(0,0,0,0.3);
}

button{
background:linear-gradient(135deg,#22c55e,#16a34a);
border:none;
padding:13px 28px;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
letter-spacing:0.5px;
transition:all 0.25s ease;
}

button:hover{
transform:translateY(-2px) scale(1.02);
box-shadow:0 8px 18px rgba(0,0,0,0.4);
}

/* OUTPUT AREA */

.output{
background:#1e2d48;
margin-top:40px;
padding:20px;
border-radius:10px;
text-align:left;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
position:relative;
}

/* COPY BUTTON INSIDE RESULT BOX */

.copyBtn{
position:absolute;
top:20px;
right:20px;
background:#3b82f6;
padding:8px 14px;
font-size:14px;
}

.copyBtn:hover{
background:#2563eb;
}

pre{
background:#0b162b;
padding:18px;
border-radius:8px;
overflow:auto;
font-size:14px;
line-height:1.5;
border-left:4px solid #22c55e;
margin-top:15px;
}

</style>
</head>

<body>

<h1>⚡ Algomancer</h1>

<div class="container">

<textarea id="codeInput" placeholder="Paste your code here..."></textarea>

<br>

<label>Input Language</label>

<select id="inputLanguage">
<option value="java">Java</option>
<option value="python">Python</option>
<option value="javascript">JavaScript</option>
<option value="c">C</option>
<option value="cpp">C++</option>
</select>

<label>Convert To</label>

<select id="outputLanguage">
<option value="java">Java</option>
<option value="python">Python</option>
<option value="javascript">JavaScript</option>
<option value="c">C</option>
<option value="cpp">C++</option>
</select>

<br>

<button onclick="optimizeCode()">Optimize / Convert Code</button>

<div class="output">

<h3>Optimized / Converted Code</h3>

<button class="copyBtn" onclick="copyCode()">Copy</button>

<pre id="outputCode">Result will appear here...</pre>

</div>

</div>

<script>

async function optimizeCode(){

const code=document.getElementById("codeInput").value
const inputLanguage=document.getElementById("inputLanguage").value
const outputLanguage=document.getElementById("outputLanguage").value

if(code.trim()===""){
alert("Please enter code")
return
}

document.getElementById("outputCode").innerText="Algomancer is processing your code..."

try{

const response=await fetch("http://127.0.0.1:8000/optimize",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
code:code,
input_language:inputLanguage,
output_language:outputLanguage
})

})

const data=await response.json()

document.getElementById("outputCode").innerText=data.optimized_code

}catch(error){

document.getElementById("outputCode").innerText="Error connecting to backend"

}

}

function copyCode(){

const code=document.getElementById("outputCode").innerText

navigator.clipboard.writeText(code)

alert("Code copied!")

}

</script>

</body>
</html>
